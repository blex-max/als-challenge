# Branches: feature branches → `main`. See README.md
name: CI

on:
  push:
  pull_request:

jobs:
  commit_checks:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install system deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq cmake ninja-build build-essential pkg-config libhts-dev
      - name: Install Python deps
        run: pip install -e ".[dev]"
      - run: ruff check cfanalysis
      - run: ruff format --check cfanalysis
      - run: python -m basedpyright cfanalysis
      - name: Complexity check (lizard)
        run: lizard src/ cfanalysis/ --CCN 10 --warnings_only -i -1
      - name: Build C++ tests
        run: cmake -B build -G Ninja -DMAKE_TEST=ON && cmake --build build --parallel
      - name: Run C++ tests
        id: cpp_tests
        run: ./build/test-cfextract --reporter console --reporter junit::out=test-results.xml
      - name: Publish test results
        if: always() && steps.cpp_tests.conclusion != 'skipped'
        uses: dorny/test-reporter@v1
        with:
          name: C++ Tests (commit)
          path: test-results.xml
          reporter: java-junit
      - name: Upload test results
        if: always() && steps.cpp_tests.conclusion != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: test-results-commit
          path: test-results.xml
          retention-days: 7

  merge_checks:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install system deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq cmake ninja-build build-essential pkg-config libhts-dev
      - name: Install Python deps
        run: pip install -e ".[dev]"
      - run: ruff check cfanalysis
      - run: ruff format --check cfanalysis
      - run: python -m basedpyright cfanalysis
      - name: Complexity check (lizard)
        run: lizard src/ cfanalysis/ --CCN 10 --warnings_only -i -1
      - name: Build C++ tests
        run: cmake -B build -G Ninja -DMAKE_TEST=ON && cmake --build build --parallel
      - name: Run C++ tests
        id: cpp_tests
        run: ./build/test-cfextract --reporter console --reporter junit::out=test-results.xml
      - name: Publish test results
        if: always() && steps.cpp_tests.conclusion != 'skipped'
        uses: dorny/test-reporter@v1
        with:
          name: C++ Tests (merge)
          path: test-results.xml
          reporter: java-junit
      - name: Upload test results
        if: always() && steps.cpp_tests.conclusion != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: test-results-merge
          path: test-results.xml
          retention-days: 7

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
